title: Kunhee.dev
description: 마크다운 블로그입니다.

# 커스텀 레이아웃 사용 (외부 테마 없이 로컬 _layouts, _includes, assets 사용)
# theme: 항목을 제거하면 GitHub Pages가 로컬 파일을 우선 사용합니다

permalink: /:year/:month/:day/:title/

# Markdown 설정
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# 플러그인
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 제외 파일
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor