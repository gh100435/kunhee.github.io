---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%Y년 %m월 %d일" }}
      </time>
      {% if page.author %}
        <span class="post-author">&nbsp;&middot;&nbsp;{{ page.author }}</span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a href="{{ '/' | relative_url }}" class="back-link">&larr; 목록으로</a>
  </footer>
</article>
